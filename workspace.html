<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>DepthRoot | Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2ede3;
    --ink: #140f05;
    --accent: #d63b07;
    --accent2: #f0a500;
    --card: #faf7f0;
    --border: #c8bda0;
    --muted: #7a6e58;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Halftone texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(20,15,5,0.05) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top accent line */
  .top-rule {
    height: 3px;
    background: var(--ink);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    height: 52px;
    border-bottom: 2px solid var(--ink);
    background: var(--bg);
    z-index: 10;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 16px;
    justify-content: space-between;
    gap: 12px;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.5px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .brand-dot {
    width: 7px;
    height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .brand em { font-style: normal; color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-new {
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 7px 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
  }

  .btn-new:hover { background: var(--accent); border-color: var(--accent); }



  /* ── VIEWPORT ── */
  .viewport {
    flex: 1;
    min-height: 0; /* critical for flex children to scroll */
    position: relative;
    z-index: 1;
  }

  #contentFrame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
    transition: opacity 0.22s ease;
  }

  /* ── FOOTER ── */
  footer {
    flex-shrink: 0;
    height: 60px;
    border-top: 2px solid var(--ink);
    background: var(--bg);
    z-index: 10;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
  }

  .nav-strip {
    display: flex;
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 3px;
    gap: 2px;
  }

  .nav-btn {
    padding: 8px 28px;
    background: transparent;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,237,227,0.45);
    cursor: pointer;
    border-radius: 1px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .nav-btn.active {
    background: var(--bg);
    color: var(--ink);
  }

  .nav-btn:not(.active):hover { color: var(--accent2); }

  /* Page label */
  .page-label {
    position: absolute;
    right: 16px;
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="top-rule"></div>

<header>
  <div class="brand">
    <span class="brand-dot"></span>
    DEPTH<em>ROOT</em>
  </div>
  <div class="header-right">
    <a href="project.html" class="btn-new">+ New</a>

    </div>
  </div>
</header>

<div class="viewport">
  <iframe id="contentFrame" src="home.html"></iframe>
</div>

<footer>
  <div class="nav-strip">
    <button class="nav-btn active" id="btn-home" onclick="switchTab(this,'home')">Home</button>
    <button class="nav-btn" id="btn-projects" onclick="switchTab(this,'projects')">Projects</button>
  </div>
  <span class="page-label" id="pageLabel"></span>
</footer>

<script>
  /*
    NAMING SCHEME:
      Slot 1  → ai.json       (base, always slot index 0, stored in bhindi_last_json)
      Slot 2  → app2.json     (stored in bhindi_app2)
      Slot 3  → app3.json     ...
      ...
      Slot 20 → app20.json    (max)

    localStorage keys for extras: bhindi_app2 … bhindi_app20
    Index of which slots are used: bhindi_slots = JSON array of slot numbers e.g. [2,3,5]
  */

  const MAX_SLOT = 20; // app2 … app20 = 19 extras

  function getSlots() {
    try { return JSON.parse(localStorage.getItem('bhindi_slots') || '[]'); }
    catch(e) { return []; }
  }
  function saveSlots(s) { localStorage.setItem('bhindi_slots', JSON.stringify(s)); }

  /* Next free slot number (2–20), or null if full */
  function nextFreeSlot() {
    const used = getSlots();
    for (let n = 2; n <= MAX_SLOT; n++) {
      if (!used.includes(n)) return n;
    }
    return null;
  }

  /* Parse TXT → knowledge blocks */
  function parseTxt(text) {
    return text.split('\n').map(line => {
      if (!line.includes(':')) return null;
      const parts = line.split(':');
      const kws = parts[0].split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
      const ans = parts.slice(1).join(':').trim();
      return (kws.length && ans) ? { keywords: kws, answer: ans } : null;
    }).filter(Boolean);
  }

  /* ══ NAV ══ */
  function switchTab(el, type) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const frame = document.getElementById('contentFrame');
    frame.style.opacity = '0';
    setTimeout(() => {
      frame.removeAttribute('srcdoc');
      if (type === 'projects') renderProjectList(frame);
      else frame.src = 'home.html';
      frame.style.opacity = '1';
    }, 220);
  }

  /* ══ PROJECT LIST ══ */
  function renderProjectList(frame) {
    const name  = localStorage.getItem('bhindi_project_name') || 'Untitled Build';
    const slots = getSlots();
    const total = 1 + slots.length;
    frame.srcdoc = page(`
      <div class="eyebrow">— Your workspace</div>
      <h2 class="big-head">ALL <span class="red">PROJECTS</span></h2>
      <div class="proj-card" onclick="window.parent.showProjectDetail()">
        <div>
          <div class="p-title">${name}</div>
          <div class="p-sub">${total} knowledge file${total > 1 ? 's' : ''} · ai.json${slots.map(n => ', app' + n + '.json').join('')}</div>
        </div>
        <span class="badge">READY</span>
      </div>
      <div class="empty-state">More projects appear here →</div>
    `);
  }

  /* ══ PROJECT DETAIL ══ */
  function showProjectDetail() {
    const frame  = document.getElementById('contentFrame');
    const name   = localStorage.getItem('bhindi_project_name') || 'Untitled Build';
    const slots  = getSlots();
    const free   = nextFreeSlot();

    /* Base ai.json block count */
    let baseBlocks = 0;
    try { baseBlocks = JSON.parse(localStorage.getItem('bhindi_last_json') || '[]').length; } catch(e){}

    /* Extra file rows */
    let extraRows = '';
    slots.forEach(n => {
      let blocks = 0;
      try { blocks = JSON.parse(localStorage.getItem('bhindi_app' + n) || '[]').length; } catch(e){}
      extraRows += `
        <div class="dl-row">
          <div style="flex:1;min-width:0" onclick="window.parent.dlSlot(${n})">
            <div class="dl-label">app${n}.json</div>
            <div class="p-sub">${blocks} blocks · tap to download</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <div class="dl-icon" onclick="window.parent.dlSlot(${n})" title="Download">↓</div>
            <div class="dl-icon" style="background:#d63b07" onclick="window.parent.deleteSlot(${n})" title="Remove">✕</div>
          </div>
        </div>`;
    });

    /* Upload zone — hidden if at max */
    const uploadZone = free ? `
      <div class="section-label" style="margin-top:20px">Add knowledge file · Next: app${free}.json</div>
      <div class="upload-zone" onclick="document.getElementById('xfi').click()">
        <div style="font-size:24px;margin-bottom:6px">+</div>
        <div class="upload-lbl">Upload TXT → saves as app${free}.json</div>
        <div class="upload-sub">Max 20 files total (slots app2 – app20)</div>
        <input type="file" id="xfi" accept=".txt" style="display:none" onchange="window.parent.handleExtraUpload(this)"/>
      </div>` :
      `<div class="note-box" style="margin-top:20px">Maximum reached — 20 files. Delete one to add more.</div>`;

    frame.style.opacity = '0';
    setTimeout(() => {
      frame.srcdoc = page(`
        <button class="back-btn" onclick="window.parent.switchTab(window.parent.document.getElementById('btn-projects'),'projects')">← Back</button>
        <div class="eyebrow">— Project assets</div>
        <h2 class="big-head">${name}</h2>

        <div class="note-box">Upload all files to the same server folder. ai.html auto-loads ai.json + app2.json … app20.json.</div>

        <div class="section-label">ai.html + ai.json · Core files</div>

        <div class="dl-row" onclick="window.parent.triggerDownload('html')">
          <div>
            <div class="dl-label">ai.html</div>
            <div class="p-sub">Chat interface — always download this</div>
          </div>
          <div class="dl-icon">↓</div>
        </div>

        <div class="dl-row" onclick="window.parent.triggerDownload('json')">
          <div>
            <div class="dl-label">ai.json</div>
            <div class="p-sub">${baseBlocks} blocks · base knowledge</div>
          </div>
          <div class="dl-icon">↓</div>
        </div>

        ${slots.length > 0 ? `<div class="section-label" style="margin-top:20px">Extra knowledge files</div>${extraRows}` : ''}

        ${uploadZone}
      `);
      frame.style.opacity = '1';
    }, 220);
  }

  /* ══ UPLOAD EXTRA TXT ══ */
  function handleExtraUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const slot = nextFreeSlot();
    if (!slot) { alert('Maximum 20 files reached.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const parsed = parseTxt(e.target.result);
      if (!parsed.length) { alert('No valid blocks found. Check the TXT format.'); return; }
      localStorage.setItem('bhindi_app' + slot, JSON.stringify(parsed));
      const slots = getSlots();
      slots.push(slot);
      slots.sort((a,b) => a - b);
      saveSlots(slots);
      showProjectDetail();
    };
    reader.readAsText(file);
  }

  /* ══ DELETE SLOT ══ */
  function deleteSlot(n) {
    if (!confirm('Remove app' + n + '.json from this project?')) return;
    localStorage.removeItem('bhindi_app' + n);
    const slots = getSlots().filter(s => s !== n);
    saveSlots(slots);
    showProjectDetail();
  }

  /* ══ DOWNLOADS ══ */
  function dl(content, filename, mime) {
    if (!content) { alert('File not found. Build the project first.'); return; }
    const blob = new Blob([content], { type: mime });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function triggerDownload(type) {
    if (type === 'html') dl(localStorage.getItem('bhindi_ai_html_code'), 'ai.html', 'text/html');
    else dl(localStorage.getItem('bhindi_last_json'), 'ai.json', 'application/json');
  }

  function dlSlot(n) {
    dl(localStorage.getItem('bhindi_app' + n), 'app' + n + '.json', 'application/json');
  }

  /* ══ SHARED PAGE TEMPLATE ══ */
  function page(body) {
    return `<!DOCTYPE html><html><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;width:100%;overflow-x:hidden}
      body{font-family:'IBM Plex Mono',monospace;background:#f2ede3;color:#140f05;padding:24px 16px 48px;position:relative}
      body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(20,15,5,.05) 1px,transparent 1px);background-size:16px 16px;pointer-events:none;z-index:0}
      .eyebrow{font-size:9px;letter-spacing:4px;color:#7a6e58;text-transform:uppercase;margin-bottom:8px}
      .big-head{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(26px,8vw,38px);letter-spacing:-1.5px;line-height:1;color:#140f05;margin-bottom:20px}
      .red{color:#d63b07}
      .proj-card{background:#faf7f0;border:2px solid #140f05;border-radius:2px;padding:18px 16px;box-shadow:4px 4px 0 #140f05;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:transform .15s,box-shadow .15s;margin-bottom:12px;position:relative;z-index:1}
      .proj-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #140f05}
      .p-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;color:#140f05}
      .p-sub{font-size:9px;color:#7a6e58;letter-spacing:1px;text-transform:uppercase;margin-top:2px;word-break:break-all}
      .badge{background:#140f05;color:#f2ede3;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;padding:5px 10px;border-radius:1px;flex-shrink:0}
      .empty-state{text-align:center;padding:40px 16px;color:#7a6e58;font-size:9px;letter-spacing:2px;text-transform:uppercase;border:2px dashed #c8bda0;border-radius:2px;margin-top:8px}
      .back-btn{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#d63b07;cursor:pointer;border:none;background:none;padding:0;margin-bottom:20px;display:inline-block}
      .note-box{background:#faf7f0;border:2px solid #c8bda0;border-radius:2px;padding:12px 14px;font-size:9px;color:#7a6e58;letter-spacing:1px;line-height:1.7;margin-bottom:18px;text-transform:uppercase;position:relative;z-index:1}
      .section-label{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:#7a6e58;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #c8bda0;position:relative;z-index:1}
      .dl-row{background:#faf7f0;border:2px solid #140f05;border-radius:2px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;margin-bottom:10px;box-shadow:3px 3px 0 #140f05;transition:transform .15s,box-shadow .15s;position:relative;z-index:1}
      .dl-row:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 #140f05}
      .dl-label{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#140f05;margin-bottom:3px}
      .dl-icon{width:30px;height:30px;background:#140f05;color:#f2ede3;border-radius:1px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;cursor:pointer;transition:background .15s}
      .upload-zone{border:2px dashed #c8bda0;border-radius:2px;padding:22px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;z-index:1;margin-bottom:10px}
      .upload-zone:hover{border-color:#140f05;background:rgba(20,15,5,0.02)}
      .upload-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#140f05;margin-bottom:3px}
      .upload-sub{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#7a6e58}
    </style></head><body>${body}</body></html>`;
  }
</script>
</body>
</html>
