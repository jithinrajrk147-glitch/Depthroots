<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<!-- ═══ PRIMARY SEO ═══ -->


<!-- ═══ FONTS ═══ -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2ede3;
    --ink: #140f05;
    --accent: #d63b07;
    --accent2: #f0a500;
    --card: #faf7f0;
    --border: #c8bda0;
    --muted: #7a6e58;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Halftone texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(20,15,5,0.05) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top accent line */
  .top-rule {
    height: 3px;
    background: var(--ink);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  /* ── HEADER ── */
  header {
    flex-shrink: 0;
    height: 52px;
    border-bottom: 2px solid var(--ink);
    background: var(--bg);
    z-index: 10;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 16px;
    justify-content: space-between;
    gap: 12px;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.5px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .brand-dot {
    width: 7px;
    height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .brand em { font-style: normal; color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .btn-new {
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 7px 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
  }

  .btn-new:hover { background: var(--accent); border-color: var(--accent); }



  /* ── VIEWPORT ── */
  .viewport {
    flex: 1;
    min-height: 0; /* critical for flex children to scroll */
    position: relative;
    z-index: 1;
  }

  #contentFrame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: var(--bg);
    transition: opacity 0.22s ease;
  }

  /* ── FOOTER ── */
  footer {
    flex-shrink: 0;
    height: 60px;
    border-top: 2px solid var(--ink);
    background: var(--bg);
    z-index: 10;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
  }

  .nav-strip {
    display: flex;
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 3px;
    gap: 2px;
  }

  .nav-btn {
    padding: 8px 28px;
    background: transparent;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,237,227,0.45);
    cursor: pointer;
    border-radius: 1px;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .nav-btn.active {
    background: var(--bg);
    color: var(--ink);
  }

  .nav-btn:not(.active):hover { color: var(--accent2); }

  /* Page label */
  .page-label {
    position: absolute;
    right: 16px;
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="top-rule"></div>

<header>
  <div class="brand">
    <span class="brand-dot"></span>
    DEPTH<em>ROOT</em>
  </div>
  <div class="header-right">
    <a href="project.html" class="btn-new">+ New</a>

    </div>
  </div>
</header>

<div class="viewport">
  <iframe id="contentFrame" src="home.html"></iframe>
</div>

<footer>
  <div class="nav-strip">
    <button class="nav-btn active" id="btn-home" onclick="switchTab(this,'home')">Home</button>
    <button class="nav-btn" id="btn-projects" onclick="switchTab(this,'projects')">Projects</button>
  </div>
  <span class="page-label" id="pageLabel"></span>
</footer>

<script>
  // ══════════════════════════════════════════════════════
  //  MULTI-PROJECT STORAGE
  //  bhindi_projects = JSON array of project objects:
  //  { id, name, url, html, json, extraFiles: [{slot, data}], createdAt }
  //  bhindi_active_project = id of project being edited
  // ══════════════════════════════════════════════════════

  const MAX_EXTRAS = 19; // app2 … app20

  // ── Project helpers ──
  function getProjects() {
    try { return JSON.parse(localStorage.getItem('bhindi_projects') || '[]'); }
    catch(e) { return []; }
  }
  function saveProjects(arr) {
    localStorage.setItem('bhindi_projects', JSON.stringify(arr));
  }
  function getActiveId() {
    return localStorage.getItem('bhindi_active_project') || null;
  }
  function getProjectById(id) {
    return getProjects().find(p => p.id === id) || null;
  }
  function updateProject(id, patch) {
    const projects = getProjects();
    const idx = projects.findIndex(p => p.id === id);
    if (idx === -1) return;
    projects[idx] = Object.assign(projects[idx], patch);
    saveProjects(projects);
  }

  // ── Parse TXT → knowledge blocks ──
  function parseTxt(text) {
    return text.split('\n').map(line => {
      line = line.trim();
      if (!line.includes(':')) return null;
      const colonIdx = line.indexOf(':');
      const kws = line.substring(0, colonIdx).split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
      const ans = line.substring(colonIdx + 1).trim();
      return (kws.length && ans) ? { keywords: kws, answer: ans } : null;
    }).filter(Boolean);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Current project being viewed in detail ──
  let _detailId = null;

  /* ══ NAV ══ */
  function switchTab(el, type) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const frame = document.getElementById('contentFrame');
    frame.style.opacity = '0';
    setTimeout(() => {
      frame.removeAttribute('srcdoc');
      if (type === 'projects') renderProjectList(frame);
      else frame.src = 'home.html';
      frame.style.opacity = '1';
    }, 220);
  }

  /* ══ PROJECT LIST ══ */
  function renderProjectList(frame) {
    const projects = getProjects();
    let cards = '';

    if (projects.length === 0) {
      cards = `<div class="empty-state">No projects yet — tap <strong>+ New</strong> to create one</div>`;
    } else {
      projects.slice().reverse().forEach(p => {
        let blockCount = 0;
        try { blockCount = JSON.parse(p.json || '[]').length; } catch(e) {}
        const extras = p.extraFiles ? p.extraFiles.length : 0;
        const totalFiles = (p.json ? 1 : 0) + extras;
        const date = p.createdAt ? new Date(p.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';
        const ready = !!(p.html && p.json);
        cards += `
          <div class="proj-card" onclick="window.parent.showProjectDetail('${p.id}')">
            <div style="flex:1;min-width:0">
              <div class="p-title">${escHtml(p.name)}</div>
              <div class="p-sub">${blockCount} blocks · ${totalFiles} json file${totalFiles!==1?'s':''} · ${date}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
              <span class="badge" style="${ready?'':'background:#d63b07'}">${ready?'READY':'DRAFT'}</span>
              <div class="dl-icon" style="background:#d63b07;width:28px;height:28px;font-size:12px" onclick="event.stopPropagation();window.parent.deleteProject('${p.id}')" title="Delete">✕</div>
            </div>
          </div>`;
      });
    }

    frame.srcdoc = page(`
      <div class="eyebrow">— Your workspace</div>
      <h2 class="big-head">ALL <span class="red">PROJECTS</span></h2>
      ${cards}
    `);
  }

  /* ══ PROJECT DETAIL ══ */
  function showProjectDetail(id) {
    _detailId = id;
    const frame = document.getElementById('contentFrame');
    const proj = getProjectById(id);
    if (!proj) return;

    // Sync flat keys so builder/json/last work
    localStorage.setItem('bhindi_active_project', proj.id);
    localStorage.setItem('bhindi_project_name', proj.name);
    localStorage.setItem('bhindi_project_url', proj.url || '');
    if (proj.html) localStorage.setItem('bhindi_ai_html_code', proj.html);
    if (proj.json) localStorage.setItem('bhindi_last_json', proj.json);

    let baseBlocks = 0;
    try { baseBlocks = JSON.parse(proj.json || '[]').length; } catch(e) {}

    const extraFiles = proj.extraFiles || [];
    const canAddMore = extraFiles.length < MAX_EXTRAS;
    const nextSlot   = extraFiles.length + 2; // app2, app3...

    // Extra file rows
    let extraRows = '';
    extraFiles.forEach((ef, idx) => {
      let blocks = 0;
      try { blocks = JSON.parse(ef.data || '[]').length; } catch(e) {}
      extraRows += `
        <div class="dl-row">
          <div style="flex:1;min-width:0">
            <div class="dl-label">app${ef.slot}.json</div>
            <div class="p-sub">${blocks} blocks · tap ↓ to download</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
            <div class="dl-icon" onclick="window.parent.dlExtra('${id}',${idx})" title="Download">↓</div>
            <div class="dl-icon" style="background:#d63b07" onclick="window.parent.deleteExtra('${id}',${idx})" title="Remove">✕</div>
          </div>
        </div>`;
    });

    const uploadZone = canAddMore ? `
      <div class="section-label" style="margin-top:20px">Add knowledge file · will save as app${nextSlot}.json</div>
      <div class="upload-zone" onclick="document.getElementById('xfi_${id}').click()">
        <div style="font-size:24px;margin-bottom:6px">+</div>
        <div class="upload-lbl">Upload TXT → app${nextSlot}.json</div>
        <div class="upload-sub">Max 19 extra files · ${MAX_EXTRAS - extraFiles.length} remaining</div>
        <input type="file" id="xfi_${id}" accept=".txt" style="display:none" onchange="window.parent.handleExtraUpload(this,'${id}')"/>
      </div>` :
      `<div class="note-box" style="margin-top:20px">Maximum 19 extra files reached. Delete one to add more.</div>`;

    const date = proj.createdAt ? new Date(proj.createdAt).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';

    frame.style.opacity = '0';
    setTimeout(() => {
      frame.srcdoc = page(`
        <button class="back-btn" onclick="window.parent.switchTab(window.parent.document.getElementById('btn-projects'),'projects')">← All Projects</button>
        <div class="eyebrow">— Project · ${escHtml(date)}</div>
        <h2 class="big-head">${escHtml(proj.name)}</h2>

        <div class="note-box">Upload all files to the <strong>same server folder</strong>. ai.html auto-loads ai.json + app2.json … app20.json.</div>

        <div class="section-label">Core files</div>

        <div class="dl-row" onclick="window.parent.dlCore('${id}','html')" style="${proj.html?'':'opacity:.4;pointer-events:none'}">
          <div>
            <div class="dl-label">ai.html</div>
            <div class="p-sub">${proj.html ? 'Chat interface · tap to download' : 'Not built yet — go to builder'}</div>
          </div>
          <div class="dl-icon">↓</div>
        </div>

        <div class="dl-row" onclick="window.parent.dlCore('${id}','json')" style="${proj.json?'':'opacity:.4;pointer-events:none'}">
          <div>
            <div class="dl-label">ai.json</div>
            <div class="p-sub">${proj.json ? baseBlocks + ' blocks · tap to download' : 'No knowledge data yet'}</div>
          </div>
          <div class="dl-icon">↓</div>
        </div>

        ${extraFiles.length > 0 ? `<div class="section-label" style="margin-top:20px">Extra knowledge files (${extraFiles.length})</div>${extraRows}` : ''}

        ${uploadZone}

        <div class="section-label" style="margin-top:20px">Actions</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="window.parent.editProject('${id}')" style="flex:1;padding:12px 8px;background:#140f05;color:#f2ede3;border:2px solid #140f05;border-radius:2px;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;min-width:100px">Edit UI →</button>
          <button onclick="window.parent.deleteProject('${id}')" style="flex:1;padding:12px 8px;background:transparent;color:#d63b07;border:2px solid #d63b07;border-radius:2px;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;min-width:100px">Delete</button>
        </div>
      `);
      frame.style.opacity = '1';
    }, 220);
  }

  /* ══ UPLOAD EXTRA TXT ══ */
  function handleExtraUpload(input, projId) {
    const file = input.files[0];
    if (!file) return;
    const proj = getProjectById(projId);
    if (!proj) return;
    const extraFiles = proj.extraFiles || [];
    if (extraFiles.length >= MAX_EXTRAS) { alert('Maximum 19 extra files reached.'); return; }

    const reader = new FileReader();
    reader.onload = e => {
      const parsed = parseTxt(e.target.result);
      if (!parsed.length) { alert('No valid blocks found. Check the TXT format.\n\nFormat: keyword1, keyword2 : Your answer here'); return; }
      const slot = extraFiles.length + 2; // app2, app3...
      extraFiles.push({ slot, data: JSON.stringify(parsed) });
      updateProject(projId, { extraFiles });
      showProjectDetail(projId);
    };
    reader.readAsText(file);
  }

  /* ══ DELETE EXTRA FILE ══ */
  function deleteExtra(projId, idx) {
    if (!confirm('Remove this extra knowledge file from the project?')) return;
    const proj = getProjectById(projId);
    if (!proj) return;
    const extraFiles = (proj.extraFiles || []).filter((_, i) => i !== idx);
    // Re-number slots sequentially
    extraFiles.forEach((ef, i) => { ef.slot = i + 2; });
    updateProject(projId, { extraFiles });
    showProjectDetail(projId);
  }

  /* ══ EDIT PROJECT ══ */
  function editProject(id) {
    const proj = getProjectById(id);
    if (!proj) return;
    localStorage.setItem('bhindi_active_project', proj.id);
    localStorage.setItem('bhindi_project_name', proj.name);
    localStorage.setItem('bhindi_project_url', proj.url || '');
    if (proj.html) localStorage.setItem('bhindi_ai_html_code', proj.html);
    if (proj.json) localStorage.setItem('bhindi_last_json', proj.json);
    window.location.href = 'builder.html';
  }

  /* ══ DELETE PROJECT ══ */
  function deleteProject(id) {
    if (!confirm('Delete this project? This cannot be undone.')) return;
    saveProjects(getProjects().filter(p => p.id !== id));
    if (getActiveId() === id) localStorage.removeItem('bhindi_active_project');
    const frame = document.getElementById('contentFrame');
    renderProjectList(frame);
  }

  /* ══ DOWNLOADS ══ */
  function dl(content, filename, mime) {
    if (!content) { alert('File not found. Build the project first.'); return; }
    const blob = new Blob([content], { type: mime });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function dlCore(id, type) {
    const proj = getProjectById(id);
    if (!proj) return;
    if (type === 'html') dl(proj.html, 'ai.html', 'text/html');
    else dl(proj.json, 'ai.json', 'application/json');
  }

  function dlExtra(id, idx) {
    const proj = getProjectById(id);
    if (!proj) return;
    const ef = (proj.extraFiles || [])[idx];
    if (!ef) return;
    dl(ef.data, 'app' + ef.slot + '.json', 'application/json');
  }

  // Legacy flat-key downloads (used by last.html)
  function triggerDownload(type) {
    if (type === 'html') dl(localStorage.getItem('bhindi_ai_html_code'), 'ai.html', 'text/html');
    else dl(localStorage.getItem('bhindi_last_json'), 'ai.json', 'application/json');
  }

  /* ══ SHARED PAGE TEMPLATE ══ */
  function page(body) {
    return `<!DOCTYPE html><html><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body{height:100%;width:100%;overflow-x:hidden}
      body{font-family:'IBM Plex Mono',monospace;background:#f2ede3;color:#140f05;padding:24px 16px 48px;position:relative}
      body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(20,15,5,.05) 1px,transparent 1px);background-size:16px 16px;pointer-events:none;z-index:0}
      .eyebrow{font-size:9px;letter-spacing:4px;color:#7a6e58;text-transform:uppercase;margin-bottom:8px}
      .big-head{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(26px,8vw,38px);letter-spacing:-1.5px;line-height:1;color:#140f05;margin-bottom:20px}
      .red{color:#d63b07}
      .proj-card{background:#faf7f0;border:2px solid #140f05;border-radius:2px;padding:18px 16px;box-shadow:4px 4px 0 #140f05;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:transform .15s,box-shadow .15s;margin-bottom:12px;position:relative;z-index:1}
      .proj-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #140f05}
      .p-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;color:#140f05}
      .p-sub{font-size:9px;color:#7a6e58;letter-spacing:1px;text-transform:uppercase;margin-top:2px;word-break:break-all}
      .badge{background:#140f05;color:#f2ede3;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;letter-spacing:2px;padding:5px 10px;border-radius:1px;flex-shrink:0}
      .empty-state{text-align:center;padding:40px 16px;color:#7a6e58;font-size:9px;letter-spacing:2px;text-transform:uppercase;border:2px dashed #c8bda0;border-radius:2px;margin-top:8px}
      .back-btn{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#d63b07;cursor:pointer;border:none;background:none;padding:0;margin-bottom:20px;display:inline-block}
      .note-box{background:#faf7f0;border:2px solid #c8bda0;border-radius:2px;padding:12px 14px;font-size:9px;color:#7a6e58;letter-spacing:1px;line-height:1.7;margin-bottom:18px;text-transform:uppercase;position:relative;z-index:1}
      .section-label{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:#7a6e58;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #c8bda0;position:relative;z-index:1}
      .dl-row{background:#faf7f0;border:2px solid #140f05;border-radius:2px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;margin-bottom:10px;box-shadow:3px 3px 0 #140f05;transition:transform .15s,box-shadow .15s;position:relative;z-index:1}
      .dl-row:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 #140f05}
      .dl-label{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#140f05;margin-bottom:3px}
      .dl-icon{width:30px;height:30px;background:#140f05;color:#f2ede3;border-radius:1px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;cursor:pointer;transition:background .15s}
      .upload-zone{border:2px dashed #c8bda0;border-radius:2px;padding:22px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;z-index:1;margin-bottom:10px}
      .upload-zone:hover{border-color:#140f05;background:rgba(20,15,5,0.02)}
      .upload-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#140f05;margin-bottom:3px}
      .upload-sub{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#7a6e58}
    </style></head><body>${body}</body></html>`;
  }
</script>
</body>
</html>
