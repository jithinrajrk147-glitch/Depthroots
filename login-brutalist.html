<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Platform | Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f2ede3;
    --ink: #140f05;
    --accent: #d63b07;
    --accent2: #f0a500;
    --card: #faf7f0;
    --border: #c8bda0;
    --muted: #7a6e58;
    --green: #1a6e3c;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
    overflow-x: hidden;
    position: relative;
  }

  /* Halftone dot texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(20,15,5,0.055) 1px, transparent 1px);
    background-size: 16px 16px;
    pointer-events: none;
    z-index: 0;
  }

  /* Big decorative background text */
  .deco-bg {
    position: fixed;
    bottom: -60px;
    right: -30px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 280px;
    color: rgba(214,59,7,0.04);
    line-height: 1;
    user-select: none;
    pointer-events: none;
    z-index: 0;
    letter-spacing: -10px;
  }

  .deco-line-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--ink);
    z-index: 100;
  }

  /* ── LAYOUT: SPLIT ── */
  .split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 700px) {
    .split { grid-template-columns: 1fr; }
    .left-panel { display: none; }
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    background: var(--ink);
    padding: 52px 44px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    border-right: 4px solid var(--ink);
  }

  /* Dot texture on dark panel */
  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
  }

  .left-logo {
    position: relative;
    z-index: 1;
  }

  .left-eyebrow {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .left-brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(52px, 7vw, 88px);
    line-height: 0.9;
    color: var(--bg);
    letter-spacing: -3px;
  }

  .left-brand em {
    font-style: normal;
    color: var(--accent);
    display: block;
  }

  /* Ruled lines decoration */
  .ruled-lines {
    position: absolute;
    bottom: 100px; left: 0; right: 0;
    z-index: 0;
  }

  .ruled-lines span {
    display: block;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 18px;
  }

  .left-bottom {
    position: relative;
    z-index: 1;
  }

  .feature-list {
    list-style: none;
  }

  .feature-list li {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: rgba(242,237,227,0.5);
    padding: 9px 0;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
  }

  .feature-list li::before {
    content: '→';
    color: var(--accent);
    font-size: 11px;
    flex-shrink: 0;
  }

  .left-tagline {
    margin-top: 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(242,237,227,0.25);
    text-transform: uppercase;
  }

  /* Big number watermark on left */
  .left-watermark {
    position: absolute;
    bottom: -20px;
    right: -20px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 200px;
    line-height: 1;
    color: rgba(255,255,255,0.025);
    user-select: none;
    letter-spacing: -8px;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    padding: 52px 44px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;

    @media (max-width: 700px) {
      padding: 48px 24px;
    }
  }

  .right-eyebrow {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: riseUp 0.4s ease both;
  }

  .right-heading {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 0.95;
    letter-spacing: -2px;
    color: var(--ink);
    margin-bottom: 10px;
    animation: riseUp 0.4s 0.05s ease both;
  }

  .right-heading em {
    font-style: normal;
    color: var(--accent);
    position: relative;
  }

  .right-heading em::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0; right: 0;
    height: 3px;
    background: var(--accent2);
    border-radius: 2px;
    transform: skewX(-6deg);
  }

  .right-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.7;
    margin-bottom: 36px;
    animation: riseUp 0.4s 0.1s ease both;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 2px;
    box-shadow: 5px 5px 0 var(--ink);
    padding: 30px 28px;
    animation: riseUp 0.4s 0.15s ease both;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .field-label {
    display: block;
    font-size: 8px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-prefix {
    position: absolute;
    left: 0;
    top: 0; bottom: 0;
    width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
    background: rgba(0,0,0,0.02);
    transition: border-color 0.2s;
  }

  .ink-input {
    width: 100%;
    padding: 13px 14px 13px 54px;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .ink-input::placeholder { color: var(--border); }

  .ink-input:focus {
    border-color: var(--ink);
    background: #fff;
  }

  .ink-input:focus ~ .input-prefix,
  .input-wrap:focus-within .input-prefix {
    border-color: var(--ink);
    color: var(--ink);
  }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .forgot-link {
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .forgot-link:hover { opacity: 0.7; }

  /* Submit button */
  .submit-btn {
    width: 100%;
    margin-top: 6px;
    background: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 2px;
    padding: 15px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    left: -100%; top: 0;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transition: left 0.5s;
  }

  .submit-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 4px 4px 0 rgba(214,59,7,0.25);
    transform: translate(-2px, -2px);
  }

  .submit-btn:hover::after { left: 160%; }
  .submit-btn:active { transform: translate(0,0); box-shadow: none; }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
  }

  .div-line {
    flex: 1;
    height: 2px;
    background: var(--border);
  }

  .div-text {
    font-size: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  /* ── GOOGLE BUTTON WRAP ── */
  #g_id_signin_wrapper {
    display: flex;
    justify-content: center;
  }

  /* ── FOOTER ROW ── */
  .form-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: riseUp 0.4s 0.25s ease both;
  }

  .signup-nudge {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .signup-nudge a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.2s;
  }

  .signup-nudge a:hover { color: var(--accent); }

  .stamp {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--border);
    border: 2px solid var(--border);
    border-radius: 2px;
    padding: 4px 8px;
    transform: rotate(-2deg);
    display: inline-block;
  }

  /* ── INFO STRIP ── */
  .info-strip {
    margin-top: 40px;
    border-top: 2px solid var(--border);
    padding-top: 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    animation: riseUp 0.4s 0.3s ease both;
  }

  @media (max-width: 500px) {
    .info-strip { grid-template-columns: 1fr; gap: 12px; }
  }

  .info-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--accent2);
    line-height: 1;
    margin-bottom: 5px;
  }

  .info-text {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    line-height: 1.7;
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes riseUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile-only header */
  .mobile-header {
    display: none;
  }

  @media (max-width: 700px) {
    .mobile-header {
      display: block;
      margin-bottom: 28px;
      animation: riseUp 0.4s ease both;
    }

    .mobile-eyebrow {
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .mobile-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 44px;
      line-height: 0.9;
      letter-spacing: -2px;
      color: var(--ink);
    }

    .mobile-brand em {
      font-style: normal;
      color: var(--accent);
    }
  }
</style>
</head>
<body>

<div class="deco-line-top"></div>
<div class="deco-bg">AI</div>

<div class="split">








      <div class="left-tagline"></div>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right-panel">

    <div class="mobile-header">
      <div class="mobile-brand">SIGN<br><em>IN.</em></div>
    </div>

    <div class="right-eyebrow">— Welcome back</div>
    <div class="right-heading">ACCESS<br>YOUR <em>ACCOUNT</em></div>
    <p class="right-sub"></p>

    <div class="form-card">
      <form onsubmit="return handleFormSubmit(event)">

        <div class="form-group">
          <label class="field-label" for="emailInput">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="emailInput" class="ink-input" placeholder="name@gmail.com" required autocomplete="off"/>
            <div class="input-prefix">✉</div>
          </div>
        </div>

        <div class="form-group">
          <div class="field-row">
            <label class="field-label" for="passInput">Password</label>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>
          <div class="input-wrap">
            <input type="password" id="passInput" class="ink-input" placeholder="••••••••" required/>
            <div class="input-prefix">⬡</div>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          Sign In →
        </button>
      </form>

      <div class="divider">
        <div class="div-line"></div>
        <span class="div-text">or</span>
        <div class="div-line"></div>
      </div>

      <div id="g_id_onload"
           data-client_id="YOUR_GOOGLE_CLIENT_ID"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="onGoogleSignIn"
           data-auto_prompt="false">
      </div>

      <div id="g_id_signin_wrapper">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-text="continue_with"
             data-size="large"
             data-width="340">
        </div>
      </div>
    </div>

    <div class="form-footer">
      <span class="signup-nudge">No account? <a href="#">Create one →</a></span>
      <span class="stamp">Free</span>
    </div>

   
  </div>

</div>

<script>
  function handleFormSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value;
    console.log("Connecting to API with:", email);
    alert("API connection initiated for: " + email);
    return false;
  }

  function onGoogleSignIn(response) {
    console.log("Google JWT Token:", response.credential);
    alert("Google Auth Success! Sending token to API...");
  }
</script>
</body>
</html>
